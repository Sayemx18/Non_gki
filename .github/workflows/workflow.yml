name: Kernel Compile Workflow

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel source repository URL'
        required: true
        default: ''
      kernel_branch:
        description: 'Kernel source branch/tag/commit'
        required: false
        default: 'main'
      DEFCONFIG:
        description: 'Kernel defconfig (e.g., rve_defconfig)'
        required: true
        default: 'rve_defconfig'
      CLANGDIR:
        description: 'Path to Clang (will be cloned if not set)'
        required: false
        default: ''
      KBUILD_BUILD_USER:
        description: 'Build user'
        required: false
        default: 'github-actions'
      KBUILD_BUILD_HOST:
        description: 'Build host'
        required: false
        default: 'github-runner'
      CLEANBUILD:
        description: 'Clean build (true/false)'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.kernel_source }}
        path: kernel
        fetch-depth: 0
      if: inputs.kernel_source != ''

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev git make

    - name: Setup Clang
      run: |
        if [ "${{ inputs.CLANGDIR }}" != "" ]; then
          echo "Custom CLANGDIR provided"
          CLANGDIR="${{ inputs.CLANGDIR }}"
        else
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          CLANGDIR="$GITHUB_WORKSPACE/clang"
        fi
        echo "CLANGDIR=$CLANGDIR" >> $GITHUB_ENV
        echo "$CLANGDIR/bin" >> $GITHUB_PATH

    - name: Clean build (if requested)
      if: inputs.CLEANBUILD == true
      run: |
        cd kernel
        rm -rf out || true

    - name: Create out directory
      run: |
        mkdir -p kernel/out

    - name: Build kernel
      env:
        DEFCONFIG: ${{ inputs.DEFCONFIG }}
        KBUILD_BUILD_USER: ${{ inputs.KBUILD_BUILD_USER || 'github-actions' }}
        KBUILD_BUILD_HOST: ${{ inputs.KBUILD_BUILD_HOST || 'github-runner' }}
      working-directory: ./kernel
      run: |
        export PATH="$CLANGDIR/bin:$PATH"
        echo "Using DEFCONFIG: $DEFCONFIG"
        echo "Using CLANGDIR: $CLANGDIR"
        echo "Using KBUILD_BUILD_USER: $KBUILD_BUILD_USER"
        echo "Using KBUILD_BUILD_HOST: $KBUILD_BUILD_HOST"
        
        make O=out ARCH=arm64 "$DEFCONFIG" || make O=out ARCH=arm64 "$DEFCONFIG"
        
        make -j$(nproc) O=out \
          LLVM=1 \
          LLVM_IAS=1 \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          AS=llvm-as \
          NM=llvm-nm \
          STRIP=llvm-strip \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          READELF=llvm-readelf \
          HOSTCC=clang \
          HOSTCXX=clang++ \
          HOSTAR=llvm-ar \
          HOSTLD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- 2>&1 | tee out/compile.log

    - name: Upload kernel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: |
          kernel/out/*.Image.*.dtb
          kernel/out/*.Image.gz*
          kernel/out/compile.log

    - name: Upload out directory (zipped)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: out-directory
        path: kernel/out/
